<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eesha's Pad 🎨</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a0533;
    --panel: #2d0a5e;
    --panel2: #3d1278;
    --accent1: #ff6bff;
    --accent2: #00f5d4;
    --accent3: #ffe44d;
    --accent4: #ff6b6b;
    --btn-radius: 12px;
    --shadow: 0 4px 24px rgba(255,107,255,0.18);
    --glow: 0 0 16px rgba(255,107,255,0.5);
    --glow2: 0 0 16px rgba(0,245,212,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 22px;
    background: linear-gradient(90deg, #3d0080 0%, #7b00cc 50%, #3d0080 100%);
    border-bottom: 3px solid var(--accent1);
    box-shadow: 0 4px 30px rgba(255,107,255,0.35);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    background: linear-gradient(135deg, #ff6bff, #ffe44d, #00f5d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
    text-shadow: none;
    filter: drop-shadow(0 0 10px rgba(255,107,255,0.6));
  }

  .logo span { font-size: 1.5rem; }

  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .hbtn {
    padding: 7px 18px;
    border: none;
    border-radius: 30px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.85rem;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.5px;
  }
  .hbtn:hover { transform: translateY(-2px); }

  .hbtn-new   { background: var(--accent4); color: #fff; box-shadow: 0 0 14px rgba(255,107,107,0.5); }
  .hbtn-save  { background: var(--accent2); color: #1a0533; box-shadow: 0 0 14px rgba(0,245,212,0.5); }
  .hbtn-clear { background: var(--accent3); color: #1a0533; box-shadow: 0 0 14px rgba(255,228,77,0.5); }

  /* ── MAIN LAYOUT ── */
  .app {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 82px;
    background: var(--panel);
    border-right: 2px solid rgba(255,107,255,0.25);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 8px;
    gap: 8px;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .sidebar-label {
    font-size: 0.6rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent1);
    opacity: 0.7;
    margin-top: 6px;
  }

  .tool-btn {
    width: 54px;
    height: 54px;
    border-radius: var(--btn-radius);
    border: 2.5px solid rgba(255,107,255,0.2);
    background: var(--panel2);
    color: #ccc;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    font-size: 0.55rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.18s;
    position: relative;
    overflow: hidden;
  }

  .tool-btn svg { width: 22px; height: 22px; flex-shrink: 0; }

  .tool-btn:hover {
    border-color: var(--accent1);
    color: #fff;
    box-shadow: 0 0 16px rgba(255,107,255,0.4);
    transform: scale(1.07);
  }

  .tool-btn.active {
    background: linear-gradient(135deg, #7b00cc, #b200ff);
    border-color: var(--accent1);
    color: #fff;
    box-shadow: var(--glow);
  }

  .tool-btn.active::before {
    content: '';
    position: absolute;
    top: -2px; left: -2px; right: -2px; bottom: -2px;
    border-radius: calc(var(--btn-radius) + 2px);
    background: linear-gradient(135deg, #ff6bff, #00f5d4, #ffe44d);
    z-index: -1;
    animation: borderGlow 2s linear infinite;
  }

  @keyframes borderGlow {
    0%,100% { opacity: 0.8; }
    50% { opacity: 1; }
  }

  .divider {
    width: 60%;
    height: 1px;
    background: rgba(255,107,255,0.2);
    margin: 4px 0;
  }

  /* Size slider */
  .size-wrap {
    width: 54px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .size-preview {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,107,255,0.12);
    border: 1.5px solid rgba(255,107,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .size-dot {
    background: var(--accent1);
    border-radius: 50%;
    transition: width 0.15s, height 0.15s;
  }

  input[type=range].size-slider {
    -webkit-appearance: none;
    width: 54px;
    height: 6px;
    background: rgba(255,107,255,0.2);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
    writing-mode: horizontal-tb;
  }

  input[type=range].size-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent1);
    box-shadow: 0 0 8px rgba(255,107,255,0.6);
    cursor: pointer;
  }

  /* Opacity */
  input[type=range].opacity-slider {
    -webkit-appearance: none;
    width: 54px;
    height: 6px;
    background: rgba(0,245,212,0.2);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }

  input[type=range].opacity-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 8px rgba(0,245,212,0.6);
    cursor: pointer;
  }

  /* ── CANVAS AREA ── */
  .canvas-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #12022a;
    position: relative;
  }

  .canvas-scroll {
    flex: 1;
    overflow: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  #mainCanvas {
    background: #fff;
    border-radius: 4px;
    box-shadow: 0 0 60px rgba(255,107,255,0.25), 0 0 0 2px rgba(255,107,255,0.3);
    cursor: crosshair;
    display: block;
  }

  /* ── COLOR PANEL ── */
  .color-panel {
    width: 192px;
    background: var(--panel);
    border-left: 2px solid rgba(255,107,255,0.25);
    display: flex;
    flex-direction: column;
    padding: 14px 10px;
    gap: 10px;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .panel-title {
    font-family: 'Fredoka One', cursive;
    font-size: 0.95rem;
    color: var(--accent1);
    letter-spacing: 1px;
    text-align: center;
  }

  /* Current color preview */
  .color-preview-wrap {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
  }

  .color-swatch-big {
    width: 52px;
    height: 52px;
    border-radius: 10px;
    border: 3px solid rgba(255,107,255,0.5);
    box-shadow: 0 0 16px rgba(255,107,255,0.3);
    cursor: pointer;
    transition: transform 0.15s;
  }
  .color-swatch-big:hover { transform: scale(1.07); }

  .color-swatch-bg {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    border: 2px solid rgba(0,245,212,0.5);
    cursor: pointer;
    background: #fff;
    box-shadow: 0 0 10px rgba(0,245,212,0.2);
    transition: transform 0.15s;
  }
  .color-swatch-bg:hover { transform: scale(1.07); }

  /* Hidden color inputs */
  #colorPicker, #bgColorPicker { display: none; }

  /* Palette */
  .palette-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 5px;
  }

  .palette-color {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
  }

  .palette-color:hover {
    transform: scale(1.2);
    border-color: #fff;
    z-index: 5;
    box-shadow: 0 0 12px rgba(255,255,255,0.5);
  }

  .palette-color.selected {
    border-color: #fff;
    box-shadow: 0 0 14px rgba(255,255,255,0.7);
    transform: scale(1.15);
  }

  /* Recent colors */
  .recent-row {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .recent-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid rgba(255,255,255,0.2);
    transition: transform 0.12s;
  }
  .recent-dot:hover { transform: scale(1.2); }

  /* Gradient presets */
  .gradient-btn {
    width: 100%;
    height: 30px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 0.7rem;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    transition: transform 0.12s, box-shadow 0.12s;
    letter-spacing: 0.5px;
  }
  .gradient-btn:hover {
    transform: scale(1.03);
    box-shadow: 0 0 14px rgba(255,255,255,0.3);
  }

  /* ── STATUS BAR ── */
  .statusbar {
    background: #1e0442;
    border-top: 2px solid rgba(255,107,255,0.2);
    padding: 5px 18px;
    display: flex;
    gap: 24px;
    align-items: center;
    flex-shrink: 0;
  }

  .status-item {
    font-size: 0.72rem;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.5px;
  }

  .status-item span {
    color: var(--accent2);
  }

  /* Eraser cursor override */
  .eraser-cursor { cursor: cell !important; }

  /* Tooltip */
  .tool-btn[data-tip]:hover::after {
    content: attr(data-tip);
    position: absolute;
    left: 110%;
    top: 50%;
    transform: translateY(-50%);
    background: #3d1278;
    color: #fff;
    font-size: 0.7rem;
    padding: 4px 10px;
    border-radius: 8px;
    white-space: nowrap;
    border: 1px solid rgba(255,107,255,0.4);
    z-index: 100;
    pointer-events: none;
  }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: rgba(255,107,255,0.05); }
  ::-webkit-scrollbar-thumb { background: rgba(255,107,255,0.3); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,107,255,0.5); }

  /* Canvas size buttons */
  .canvas-size-btn {
    padding: 5px 8px;
    background: var(--panel2);
    border: 1.5px solid rgba(255,107,255,0.25);
    border-radius: 8px;
    color: #ccc;
    font-family: 'Nunito', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .canvas-size-btn:hover {
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .canvas-size-btn.active {
    background: rgba(0,245,212,0.15);
    border-color: var(--accent2);
    color: var(--accent2);
  }

  .flex-row { display: flex; gap: 6px; flex-wrap: wrap; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">✏️ Eesha's Pad <span>🎨</span></div>
  <div class="header-actions">
    <button class="hbtn hbtn-clear" onclick="clearCanvas()">🗑️ Clear</button>
    <button class="hbtn hbtn-new" onclick="newCanvas()">✨ New</button>
    <button class="hbtn hbtn-save" onclick="saveCanvas()">💾 Save</button>
  </div>
</header>

<!-- MAIN -->
<div class="app">

  <!-- SIDEBAR: TOOLS -->
  <aside class="sidebar">
    <div class="sidebar-label">Tools</div>

    <button class="tool-btn active" id="tool-pen" data-tool="pen" data-tip="Pen" onclick="selectTool('pen')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M12 19l7-7-3-3-7 7v3h3z"/><path d="M18 13l-1.5-7.5L21 2l2 2-1.5 7.5-3.5 1.5z"/>
      </svg>
      Pen
    </button>

    <button class="tool-btn" id="tool-pencil" data-tool="pencil" data-tip="Pencil" onclick="selectTool('pencil')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="18" y1="2" x2="22" y2="6"/><path d="M5 20L2 22l2-3 13-13 3 3L5 20z"/>
      </svg>
      Pencil
    </button>

    <button class="tool-btn" id="tool-brush" data-tool="brush" data-tip="Paintbrush" onclick="selectTool('brush')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M3 21c3-3 4-8 6-10s4-2 6 0 2 4 0 6-7 3-10 6z"/><path d="M9 11l5-5 3 3-5 5"/>
      </svg>
      Brush
    </button>

    <button class="tool-btn" id="tool-spray" data-tool="spray" data-tip="Spray" onclick="selectTool('spray')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="13" width="10" height="8" rx="2"/><path d="M13 17h4a2 2 0 0 0 2-2v-1a2 2 0 0 0-2-2h-4"/><line x1="8" y1="9" x2="8" y2="13"/><line x1="5" y1="6" x2="5" y2="9"/><line x1="11" y1="7" x2="11" y2="9"/>
      </svg>
      Spray
    </button>

    <div class="divider"></div>

    <button class="tool-btn" id="tool-fill" data-tool="fill" data-tip="Fill Bucket" onclick="selectTool('fill')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M19 11l-8-8-8.5 8.5a5.5 5.5 0 0 0 7.78 7.78L19 11z"/><path d="M20 16s0 3 1.5 3 1.5-3 1.5-3a1.5 1.5 0 0 0-3 0z"/>
      </svg>
      Fill
    </button>

    <button class="tool-btn" id="tool-eraser" data-tool="eraser" data-tip="Eraser" onclick="selectTool('eraser')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M20 20H7L3 16l10-10 7 7-3.5 3.5"/><path d="M3 20h18"/>
      </svg>
      Eraser
    </button>

    <button class="tool-btn" id="tool-line" data-tool="line" data-tip="Line" onclick="selectTool('line')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="5" y1="19" x2="19" y2="5"/>
      </svg>
      Line
    </button>

    <button class="tool-btn" id="tool-rect" data-tool="rect" data-tip="Rectangle" onclick="selectTool('rect')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="5" width="18" height="14" rx="1"/>
      </svg>
      Rect
    </button>

    <button class="tool-btn" id="tool-circle" data-tool="circle" data-tip="Circle" onclick="selectTool('circle')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="9"/>
      </svg>
      Circle
    </button>

    <div class="divider"></div>
    <div class="sidebar-label">Size</div>

    <div class="size-wrap">
      <div class="size-preview">
        <div class="size-dot" id="sizeDot" style="width:8px;height:8px;"></div>
      </div>
      <input type="range" class="size-slider" id="sizeSlider" min="1" max="60" value="8" oninput="updateSize(this.value)">
    </div>

    <div class="sidebar-label" style="margin-top:4px;">Opacity</div>
    <div class="size-wrap">
      <input type="range" class="opacity-slider" id="opacitySlider" min="10" max="100" value="100" oninput="updateOpacity(this.value)">
    </div>

    <div class="divider"></div>
    <div class="sidebar-label">Undo</div>
    <button class="tool-btn" data-tip="Undo" onclick="undo()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/>
      </svg>
      Undo
    </button>
    <button class="tool-btn" data-tip="Redo" onclick="redo()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 0 1 4-4h12"/>
      </svg>
      Redo
    </button>
  </aside>

  <!-- CANVAS -->
  <div class="canvas-area">
    <div class="canvas-scroll">
      <canvas id="mainCanvas" width="900" height="600"></canvas>
    </div>
  </div>

  <!-- COLOR PANEL -->
  <aside class="color-panel">
    <div class="panel-title">🎨 Colors</div>

    <!-- Color preview -->
    <div class="color-preview-wrap">
      <div>
        <div style="font-size:0.6rem;color:rgba(255,107,255,0.7);font-weight:800;text-align:center;margin-bottom:3px;">DRAW</div>
        <div class="color-swatch-big" id="currentColorSwatch" style="background:#000000;" onclick="document.getElementById('colorPicker').click()"></div>
        <input type="color" id="colorPicker" value="#000000" oninput="setColor(this.value)">
      </div>
      <div>
        <div style="font-size:0.6rem;color:rgba(0,245,212,0.7);font-weight:800;text-align:center;margin-bottom:3px;">BG</div>
        <div class="color-swatch-bg" id="bgColorSwatch" onclick="document.getElementById('bgColorPicker').click()"></div>
        <input type="color" id="bgColorPicker" value="#ffffff" oninput="setBgColor(this.value)">
      </div>
    </div>

    <!-- Palette -->
    <div class="palette-grid" id="palette"></div>

    <!-- Recent -->
    <div class="panel-title" style="font-size:0.75rem;margin-top:2px;">Recent</div>
    <div class="recent-row" id="recentColors"></div>

    <!-- Gradient presets -->
    <div class="panel-title" style="font-size:0.75rem;margin-top:4px;">Quick Sets</div>
    <button class="gradient-btn" style="background:linear-gradient(90deg,#ff6bff,#7b00cc);" onclick="applyPreset('neon')">🌈 Neon</button>
    <button class="gradient-btn" style="background:linear-gradient(90deg,#ff6b6b,#ffe44d);" onclick="applyPreset('sunset')">🌅 Sunset</button>
    <button class="gradient-btn" style="background:linear-gradient(90deg,#00f5d4,#0099ff);" onclick="applyPreset('ocean')">🌊 Ocean</button>
    <button class="gradient-btn" style="background:linear-gradient(90deg,#a8ff78,#78ffd6);" onclick="applyPreset('forest')">🌿 Forest</button>
    <button class="gradient-btn" style="background:linear-gradient(90deg,#ffffff,#888);" onclick="applyPreset('mono')">🖤 Mono</button>

    <!-- Canvas size -->
    <div class="panel-title" style="font-size:0.75rem;margin-top:4px;">Canvas</div>
    <div class="flex-row">
      <button class="canvas-size-btn active" onclick="resizeCanvas(900,600,this)">900×600</button>
      <button class="canvas-size-btn" onclick="resizeCanvas(1200,800,this)">1200×800</button>
      <button class="canvas-size-btn" onclick="resizeCanvas(600,600,this)">600×600</button>
    </div>
  </aside>
</div>

<!-- STATUS BAR -->
<div class="statusbar">
  <div class="status-item">Tool: <span id="statusTool">Pen</span></div>
  <div class="status-item">Size: <span id="statusSize">8</span>px</div>
  <div class="status-item">Opacity: <span id="statusOpacity">100</span>%</div>
  <div class="status-item">Pos: <span id="statusPos">—</span></div>
  <div class="status-item">Canvas: <span id="statusCanvas">900 × 600</span></div>
</div>

<script>
// ── STATE ──
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

let tool = 'pen';
let drawing = false;
let color = '#000000';
let bgColor = '#ffffff';
let brushSize = 8;
let opacity = 1;
let lastX = 0, lastY = 0;
let startX = 0, startY = 0;
let undoStack = [];
let redoStack = [];
let sprayInterval = null;
let snapshot = null; // for shape preview

// ── PALETTE ──
const PALETTE = [
  '#000000','#333333','#666666','#999999','#cccccc','#ffffff',
  '#ff0000','#ff6600','#ffcc00','#ffff00','#99cc00','#00cc00',
  '#00cc99','#00ccff','#0066ff','#6600ff','#cc00ff','#ff0099',
  '#ff6bff','#ff6b6b','#ffe44d','#00f5d4','#7b00cc','#0099ff',
  '#ff9966','#ff6633','#cc3300','#993300','#663300','#330000',
  '#ccffcc','#99ff99','#66ff66','#33cc33','#009900','#006600',
  '#cceeff','#99ddff','#66bbff','#3399ff','#0066cc','#003399',
];

const PRESETS = {
  neon: ['#ff6bff','#cc00ff','#7b00cc','#ff0099','#ff6b6b','#ffe44d'],
  sunset: ['#ff6b6b','#ff8c42','#ffcc00','#ffe44d','#ffaa00','#cc5500'],
  ocean: ['#00f5d4','#00ddbb','#0099ff','#0066cc','#003399','#001166'],
  forest: ['#a8ff78','#78ffd6','#00cc66','#009933','#006600','#003300'],
  mono: ['#ffffff','#e0e0e0','#bbbbbb','#888888','#555555','#000000'],
};

let recentColors = [];

function buildPalette() {
  const grid = document.getElementById('palette');
  grid.innerHTML = '';
  PALETTE.forEach(c => {
    const el = document.createElement('div');
    el.className = 'palette-color';
    el.style.background = c;
    el.title = c;
    el.onclick = () => { setColor(c); addRecent(c); };
    grid.appendChild(el);
  });
}

function applyPreset(name) {
  const colors = PRESETS[name];
  // set the first as current
  setColor(colors[0]);
  // rebuild top area of palette with these colors
  const grid = document.getElementById('palette');
  grid.innerHTML = '';
  const combined = [...colors, ...PALETTE.filter(c => !colors.includes(c))];
  combined.slice(0, PALETTE.length).forEach(c => {
    const el = document.createElement('div');
    el.className = 'palette-color';
    el.style.background = c;
    el.onclick = () => { setColor(c); addRecent(c); };
    grid.appendChild(el);
  });
}

function addRecent(c) {
  if (!recentColors.includes(c)) {
    recentColors.unshift(c);
    if (recentColors.length > 12) recentColors.pop();
    renderRecent();
  }
}

function renderRecent() {
  const wrap = document.getElementById('recentColors');
  wrap.innerHTML = '';
  recentColors.forEach(c => {
    const el = document.createElement('div');
    el.className = 'recent-dot';
    el.style.background = c;
    el.onclick = () => setColor(c);
    wrap.appendChild(el);
  });
}

function setColor(c) {
  color = c;
  document.getElementById('colorPicker').value = c;
  document.getElementById('currentColorSwatch').style.background = c;
  addRecent(c);
}

function setBgColor(c) {
  bgColor = c;
  document.getElementById('bgColorSwatch').style.background = c;
  ctx.fillStyle = c;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // redraw content if any - simple approach: just update bg
}

// ── TOOL SELECTION ──
function selectTool(t) {
  tool = t;
  document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('tool-' + t);
  if (btn) btn.classList.add('active');
  canvas.classList.toggle('eraser-cursor', t === 'eraser');
  const names = {pen:'Pen',pencil:'Pencil',brush:'Brush',spray:'Spray',fill:'Fill',eraser:'Eraser',line:'Line',rect:'Rect',circle:'Circle'};
  document.getElementById('statusTool').textContent = names[t] || t;
}

// ── SIZE / OPACITY ──
function updateSize(v) {
  brushSize = parseInt(v);
  const dot = document.getElementById('sizeDot');
  const s = Math.min(36, Math.max(4, brushSize * 0.85));
  dot.style.width = s + 'px';
  dot.style.height = s + 'px';
  document.getElementById('statusSize').textContent = brushSize;
}

function updateOpacity(v) {
  opacity = parseInt(v) / 100;
  document.getElementById('statusOpacity').textContent = v;
}

// ── CANVAS SETUP ──
function fillCanvasWhite() {
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

fillCanvasWhite();
saveState();

// ── UNDO / REDO ──
function saveState() {
  undoStack.push(canvas.toDataURL());
  if (undoStack.length > 40) undoStack.shift();
  redoStack = [];
}

function undo() {
  if (undoStack.length <= 1) return;
  redoStack.push(undoStack.pop());
  loadState(undoStack[undoStack.length - 1]);
}

function redo() {
  if (!redoStack.length) return;
  const state = redoStack.pop();
  undoStack.push(state);
  loadState(state);
}

function loadState(dataURL) {
  const img = new Image();
  img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); };
  img.src = dataURL;
}

// ── DRAW HELPERS ──
function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const scaleX = canvas.width / r.width;
  const scaleY = canvas.height / r.height;
  if (e.touches) {
    return { x: (e.touches[0].clientX - r.left) * scaleX, y: (e.touches[0].clientY - r.top) * scaleY };
  }
  return { x: (e.clientX - r.left) * scaleX, y: (e.clientY - r.top) * scaleY };
}

function setDrawStyle(ctx2 = ctx) {
  ctx2.globalAlpha = opacity;
  ctx2.strokeStyle = color;
  ctx2.fillStyle = color;
}

// ── SPRAY ──
function doSpray(x, y) {
  ctx.globalAlpha = opacity * 0.25;
  ctx.fillStyle = color;
  const density = brushSize * 3;
  for (let i = 0; i < density; i++) {
    const angle = Math.random() * Math.PI * 2;
    const radius = Math.random() * brushSize * 1.5;
    const sx = x + radius * Math.cos(angle);
    const sy = y + radius * Math.sin(angle);
    ctx.beginPath();
    ctx.arc(sx, sy, 0.8, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── FLOOD FILL ──
function floodFill(startX, startY, fillColor) {
  const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imgData.data;
  const w = canvas.width;
  const h = canvas.height;

  function getIdx(x, y) { return (y * w + x) * 4; }
  function colorAt(idx) { return [data[idx], data[idx+1], data[idx+2], data[idx+3]]; }
  function colorEq(a, b) { return a[0]===b[0] && a[1]===b[1] && a[2]===b[2] && a[3]===b[3]; }

  const fc = parseInt(fillColor.replace('#',''), 16);
  const fr = (fc >> 16) & 255, fg = (fc >> 8) & 255, fb = fc & 255;

  const sx = Math.round(startX), sy = Math.round(startY);
  if (sx < 0 || sy < 0 || sx >= w || sy >= h) return;

  const targetColor = colorAt(getIdx(sx, sy));
  const fillC = [fr, fg, fb, 255];
  if (colorEq(targetColor, fillC)) return;

  const stack = [[sx, sy]];
  const visited = new Uint8Array(w * h);

  while (stack.length) {
    const [cx, cy] = stack.pop();
    if (cx < 0 || cy < 0 || cx >= w || cy >= h) continue;
    const idx = getIdx(cx, cy);
    const vi = cy * w + cx;
    if (visited[vi]) continue;
    if (!colorEq(colorAt(idx), targetColor)) continue;
    visited[vi] = 1;
    data[idx] = fr; data[idx+1] = fg; data[idx+2] = fb; data[idx+3] = 255;
    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
  ctx.putImageData(imgData, 0, 0);
}

// ── MOUSE EVENTS ──
canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', e => { e.preventDefault(); startDraw(e); }, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); draw(e); }, {passive:false});
canvas.addEventListener('touchend', endDraw);

canvas.addEventListener('mousemove', e => {
  const p = getPos(e);
  document.getElementById('statusPos').textContent = `${Math.round(p.x)}, ${Math.round(p.y)}`;
});

function startDraw(e) {
  drawing = true;
  const p = getPos(e);
  lastX = p.x; lastY = p.y;
  startX = p.x; startY = p.y;

  if (tool === 'fill') {
    floodFill(p.x, p.y, color);
    saveState();
    drawing = false;
    return;
  }

  if (tool === 'spray') {
    doSpray(p.x, p.y);
    sprayInterval = setInterval(() => {
      if (drawing) {
        const lp = { x: lastX, y: lastY };
        doSpray(lp.x, lp.y);
      }
    }, 30);
    return;
  }

  if (tool === 'line' || tool === 'rect' || tool === 'circle') {
    snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
  }

  ctx.beginPath();
  ctx.arc(p.x, p.y, (tool === 'eraser' ? brushSize : brushSize / 2), 0, Math.PI * 2);
  ctx.fillStyle = tool === 'eraser' ? bgColor : color;
  ctx.globalAlpha = opacity;
  ctx.fill();
  ctx.globalAlpha = 1;
}

function draw(e) {
  const p = getPos(e);

  if (tool === 'spray') {
    lastX = p.x; lastY = p.y;
    return;
  }

  if (!drawing) return;

  if (tool === 'line') {
    ctx.putImageData(snapshot, 0, 0);
    ctx.globalAlpha = opacity;
    ctx.strokeStyle = color;
    ctx.lineWidth = brushSize;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    ctx.globalAlpha = 1;
    return;
  }

  if (tool === 'rect') {
    ctx.putImageData(snapshot, 0, 0);
    ctx.globalAlpha = opacity;
    ctx.strokeStyle = color;
    ctx.lineWidth = brushSize;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.strokeRect(startX, startY, p.x - startX, p.y - startY);
    ctx.globalAlpha = 1;
    return;
  }

  if (tool === 'circle') {
    ctx.putImageData(snapshot, 0, 0);
    ctx.globalAlpha = opacity;
    ctx.strokeStyle = color;
    ctx.lineWidth = brushSize;
    const rx = (p.x - startX) / 2;
    const ry = (p.y - startY) / 2;
    const cx2 = startX + rx, cy2 = startY + ry;
    ctx.beginPath();
    ctx.ellipse(cx2, cy2, Math.abs(rx), Math.abs(ry), 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
    return;
  }

  ctx.globalAlpha = opacity;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  if (tool === 'eraser') {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = bgColor;
    ctx.lineWidth = brushSize * 2;
  } else if (tool === 'brush') {
    ctx.strokeStyle = color;
    ctx.lineWidth = brushSize * 2.5;
    ctx.shadowBlur = brushSize * 0.6;
    ctx.shadowColor = color;
  } else if (tool === 'pencil') {
    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(1, brushSize * 0.4);
    ctx.globalAlpha = opacity * 0.7;
    ctx.shadowBlur = 0;
  } else {
    // pen
    ctx.strokeStyle = color;
    ctx.lineWidth = brushSize;
    ctx.shadowBlur = 0;
  }

  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;

  lastX = p.x; lastY = p.y;
}

function endDraw(e) {
  if (!drawing) return;
  drawing = false;
  clearInterval(sprayInterval);
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  saveState();
}

// ── ACTIONS ──
function clearCanvas() {
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  saveState();
}

function newCanvas() {
  if (!confirm('Start a new canvas? Your current drawing will be lost.')) return;
  bgColor = '#ffffff';
  document.getElementById('bgColorPicker').value = '#ffffff';
  document.getElementById('bgColorSwatch').style.background = '#ffffff';
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  undoStack = [];
  redoStack = [];
  saveState();
}

function saveCanvas() {
  const link = document.createElement('a');
  link.download = "eeshas-pad-drawing.png";
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function resizeCanvas(w, h, btn) {
  const data = canvas.toDataURL();
  canvas.width = w;
  canvas.height = h;
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, w, h);
  const img = new Image();
  img.onload = () => { ctx.drawImage(img, 0, 0); saveState(); };
  img.src = data;
  document.getElementById('statusCanvas').textContent = `${w} × ${h}`;
  document.querySelectorAll('.canvas-size-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

// ── KEYBOARD SHORTCUTS ──
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
  if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
  if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveCanvas(); }
  const keys = { 'p': 'pen', 'c': 'pencil', 'b': 'brush', 's': 'spray', 'f': 'fill', 'e': 'eraser', 'l': 'line', 'r': 'rect', 'o': 'circle' };
  if (!e.ctrlKey && keys[e.key]) selectTool(keys[e.key]);
});

// ── INIT ──
buildPalette();
setColor('#000000');
document.getElementById('bgColorSwatch').style.background = '#ffffff';
</script>
</body>
</html>
